services:
  - type: web
    name: pulsecrm-backend
    env: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false

      - key: GROQ_API_KEY
        sync: false

      - key: CHANNEL_SERVICE_URL
        sync: false

  - type: web
    name: mock-channel-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn channel_service:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CRM_CALLBACK_URL
        sync: false